<!doctype html>
<html>
    <head>
        <meta charset="utf-8" />
        <meta name="viewport" content="width=device-width,initial-scale=1" />
        <link rel="stylesheet" href="css/popup.css" />
    </head>
    <body>
        <h3>Cito Builder</h3>

        <div class="field-group">
            <label>Select Template</label>
            <div class="custom-select" data-id="templates">
                <div class="select-trigger"><span>Loading...</span></div>
                <div class="custom-options"></div>
            </div>
        </div>
        <hr
            style="
                border: 0;
                border-top: 1px solid var(--border);
                margin: 20px 0;
            "
        />

        <div class="field-group">
            <label>Persona</label>
            <div class="custom-select" data-id="persona">
                <div class="select-trigger"><span>Loading...</span></div>
                <div class="custom-options"></div>
            </div>
        </div>

        <div class="field-group">
            <label>Operator</label>
            <div class="custom-select" data-id="operator">
                <div class="select-trigger"><span>Loading...</span></div>
                <div class="custom-options"></div>
            </div>
        </div>

        <div class="field-group">
            <label for="input">Input</label>
            <textarea
                id="input"
                placeholder="What do you want to do?"
            ></textarea>
        </div>

        <div class="field-group">
            <label for="context">Context</label>
            <textarea
                id="context"
                placeholder="Any additional background?"
            ></textarea>
        </div>

        <div class="field-group">
            <label>Format</label>
            <div class="custom-select" data-id="format">
                <div class="select-trigger"><span>Loading...</span></div>
                <div class="custom-options"></div>
            </div>
        </div>

        <div class="field-group">
            <label for="constraint">Constraint</label>
            <input
                type="text"
                id="constraint"
                placeholder="e.g. Under 100 words"
            />
        </div>

        <button id="generateBtn">Craft Prompt</button>

        <script src="scripts/popup.js"></script>
    </body>
</html>

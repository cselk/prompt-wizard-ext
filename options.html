<!doctype html>
<html>
    <head>
        <meta charset="utf-8" />
        <meta name="viewport" content="width=device-width,initial-scale=1" />
        <title>Cito Settings</title>
        <link rel="stylesheet" href="css/options.css" />
    </head>
    <body>
        <div class="container">
            <div class="page-header">
                <h1>Cito Preferences</h1>
                <div class="header-actions">
                    <button
                        id="import-btn"
                        class="export-btn"
                        title="Import JSON"
                    >
                        Import
                    </button>
                    <button
                        id="export-btn"
                        class="export-btn"
                        title="Export JSON"
                    >
                        Export
                    </button>
                    <input
                        type="file"
                        id="import-file-input"
                        accept=".json"
                        class="hidden-file-input"
                    />
                </div>
            </div>

            <div class="sections-grid">
                <div class="section">
                    <h2>Personas</h2>
                    <div class="item-list" id="persona-list"></div>
                    <button class="add-btn" data-category="persona">
                        + Create
                    </button>
                </div>

                <div class="section">
                    <h2>Operators</h2>
                    <div class="item-list" id="operator-list"></div>
                    <button class="add-btn" data-category="operator">
                        + Create
                    </button>
                </div>

                <div class="section">
                    <h2>Formats</h2>
                    <div class="item-list" id="format-list"></div>
                    <button class="add-btn" data-category="format">
                        + Create
                    </button>
                </div>

                <div class="section">
                    <h2>Template Library</h2>
                    <div id="template-list" class="item-list"></div>
                    <button class="add-btn" data-category="template">
                        + Create
                    </button>
                </div>

                <div class="section">
                    <h2>Snippet Library</h2>
                    <div id="snippet-list" class="item-list"></div>
                    <button class="add-btn" data-category="snippet">
                        + Create
                    </button>
                </div>
            </div>
        </div>
        <!-- Edit Modal -->
        <div id="edit-modal" class="modal-overlay" aria-hidden="true">
            <div
                class="modal"
                role="dialog"
                aria-modal="true"
                aria-labelledby="modal-title"
            >
                <h3 id="modal-title" class="modal-title">Edit Item</h3>
                <div class="modal-field">
                    <label class="modal-label" for="modal-input">Name</label>
                    <input type="text" id="modal-input" class="modal-input" />
                </div>
                <div class="modal-field">
                    <label
                        class="modal-label"
                        id="modal-details-label"
                        for="modal-details"
                        >Details</label
                    >
                    <textarea
                        id="modal-details"
                        class="modal-details"
                    ></textarea>
                </div>
                <div class="modal-actions">
                    <button
                        id="modal-cancel-btn"
                        class="modal-btn modal-btn--cancel"
                    >
                        Cancel
                    </button>
                    <button
                        id="modal-save-btn"
                        class="modal-btn modal-btn--save"
                    >
                        Save
                    </button>
                </div>
            </div>
        </div>

        <script src="scripts/options.js"></script>
    </body>
</html>

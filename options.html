<!doctype html>
<html>
    <head>
        <title>Cito Settings</title>
        <link rel="stylesheet" href="css/options.css" />
    </head>
    <body>
        <div class="container">
            <h1>Cito Preferences</h1>

            <div class="section">
                <h2>Personas</h2>
                <div class="item-list" id="persona-list"></div>
                <button class="add-btn" data-category="persona">+ Create</button>
            </div>

            <div class="section">
                <h2>Operators</h2>
                <div class="item-list" id="operator-list"></div>
                <button class="add-btn" data-category="operator">+ Create</button>
            </div>

            <div class="section">
                <h2>Formats</h2>
                <div class="item-list" id="format-list"></div>
                <button class="add-btn" data-category="format">+ Create</button>
            </div>

            <div class="section">
                <h2>Template Gallery</h2>
                <div id="template-list" class="item-list"></div>

                <div class="input-group" style="margin-top: 20px">
                    <label>Template Name</label>
                    <input
                        type="text"
                        id="template-name"
                        placeholder="e.g., Code Reviewer"
                    />

                    <br />
                    <br />

                    <label style="margin-top: 10px">Prompt Structure</label>
                    <textarea
                        id="template-content"
                        style="height: 150px; font-family: monospace"
                        placeholder="Use {{persona}}, {{input}}, etc."
                    ></textarea>

                    <button
                        id="save-template-btn"
                        class="add-btn"
                        style="margin-top: 10px"
                    >
                        Add to Gallery
                    </button>
                </div>
            </div>

            <div class="section last">
                <h2>Snippet Manager</h2>
                <div id="snippet-list" class="item-list"></div>

                <div class="input-group" style="margin-top: 20px">
                    <label>Snippet Name</label>
                    <input
                        type="text"
                        id="snippet-name"
                        placeholder="e.g., 3-bullet Summary"
                    />

                    <br />
                    <br />

                    <label style="margin-top: 10px">Snippet</label>
                    <textarea
                        id="snippet-content"
                        style="height: 150px; font-family: monospace"
                        placeholder="Summarize the following in only 3 bullet points and ..."
                    ></textarea>

                    <button
                        id="save-snippet-btn"
                        class="add-btn"
                        style="margin-top: 10px"
                    >
                        Create Snippet
                    </button>
                </div>
            </div>
        </div>
        <!-- Edit Modal -->
        <div id="edit-modal" class="modal-overlay" aria-hidden="true">
            <div class="modal" role="dialog" aria-modal="true" aria-labelledby="modal-title">
                <h3 id="modal-title" class="modal-title">Edit Item</h3>
                <input type="text" id="modal-input" class="modal-input" />
                <div class="modal-actions">
                    <button id="modal-cancel-btn" class="modal-btn modal-btn--cancel">Cancel</button>
                    <button id="modal-save-btn" class="modal-btn modal-btn--save">Save</button>
                </div>
            </div>
        </div>

        <script src="scripts/options.js"></script>
    </body>
</html>
